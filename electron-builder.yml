publish:
  provider: github
  owner: SamaritanOC
  repo: remote-claw

appId: io.github.samaritanoc.remoteclaw
productName: RemoteClaw for Linux
executableName: remoteclaw
copyright: Copyright 2026 SamaritanOC
artifactName: remoteclaw-${version}-${arch}.${ext}

directories:
  output: dist-app
  buildResources: build

files:
  - dist-electron/**/*
  - control-ui/**/*

asarUnpack:
  - control-ui/**/*

linux:
  target:
    - deb
    - AppImage
  category: Utility
  icon: build/icon.png
  executableName: remoteclaw
  description: Native Linux desktop app for RemoteClaw for Linux — remote access to your OpenClaw installation

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libdrm2
    - libgbm1
