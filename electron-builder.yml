publish:
  provider: github
  owner: SamaritanOC
  repo: oc-dashporter

appId: io.github.samaritanoc.oc-dashporter
productName: OC Dashporter
executableName: oc-dashporter
copyright: Copyright 2026 SamaritanOC
artifactName: oc-dashporter-${version}-${arch}.${ext}

directories:
  output: dist-app
  buildResources: build

files:
  - dist-electron/**/*
  - control-ui/**/*

asarUnpack:
  - control-ui/**/*

linux:
  target:
    - deb
    - AppImage
  category: Utility
  icon: build/icon.png
  executableName: oc-dashporter
  description: Native Linux desktop app for remote access to your OpenClaw installation

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libdrm2
    - libgbm1
