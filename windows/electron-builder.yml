publish:
  provider: github
  owner: SamaritanOC
  repo: oc-dashporter

appId: io.github.samaritanoc.oc-dashporter-windows
productName: OC Dashporter for Windows
executableName: oc-dashporter-windows
copyright: Copyright 2026 SamaritanOC
artifactName: oc-dashporter-windows-setup.${ext}

directories:
  output: dist-app
  buildResources: windows/build

files:
  - from: windows/dist-electron
    to: dist-electron
    filter: "**/*"

extraMetadata:
  main: dist-electron/main.js

win:
  target:
    - nsis
  icon: windows/build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OC Dashporter for Windows
