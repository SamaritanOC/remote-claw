publish:
  provider: github
  owner: SamaritanOC
  repo: remote-claw

appId: io.github.samaritanoc.remoteclaw
productName: RemoteClaw for Windows
executableName: RemoteClaw
copyright: Copyright 2026 SamaritanOC
artifactName: remoteclaw-windows-setup.${ext}

extraMetadata:
  main: windows/dist-electron/main.js

directories:
  output: dist-app
  buildResources: windows/build

files:
  - windows/dist-electron/**/*
  - control-ui/**/*

asarUnpack:
  - control-ui/**/*

win:
  target:
    - nsis
  icon: windows/build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: RemoteClaw for Windows
