publish:
  provider: github
  owner: SamaritanOC
  repo: oc-dashporter

appId: io.github.samaritanoc.oc-dashporter-windows
productName: OC Dashporter for Windows
executableName: oc-dashporter-windows
copyright: Copyright 2026 SamaritanOC
artifactName: oc-dashporter-windows-setup.${ext}

directories:
  output: windows/dist-app
  buildResources: windows/build
  app: .

files:
  - dist-electron/**/*

win:
  target:
    - nsis
  icon: windows/build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OC Dashporter for Windows
