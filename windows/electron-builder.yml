publish:
  provider: github
  owner: SamaritanOC
  repo: oc-dashporter

appId: io.github.samaritanoc.oc-dashporter-windows
productName: OC Dashporter for Windows
executableName: oc-dashporter-windows
copyright: Copyright 2026 SamaritanOC
artifactName: oc-dashporter-windows-setup.${ext}

extraMetadata:
  main: windows/dist-electron/main.js

directories:
  output: dist-app
  buildResources: windows/build

files:
  - windows/dist-electron/**/*
  - control-ui/**/*

asarUnpack:
  - control-ui/**/*

win:
  target:
    - nsis
  icon: windows/build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OC Dashporter for Windows
