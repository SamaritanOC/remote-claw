publish:
  provider: github
  owner: SamaritanOC
  repo: oc-dashporter

appId: io.github.samaritanoc.oc-dashporter
productName: OC Dashporter
executableName: oc-dashporter
copyright: Copyright 2026 SamaritanOC
artifactName: oc-dashporter-windows-setup.${ext}

directories:
  output: dist-app
  buildResources: build

files:
  - dist-electron/**/*

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OC Dashporter
